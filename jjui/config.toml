[[actions]]
name = "new-from-main"
lua = '''
  jj_async("new", "main")
  revisions.refresh()
'''

[[actions]]
name = "push"
lua = '''
  jj_async("push")
  revisions.refresh()
'''

[[actions]]
name = "push-closest-bookmark"
lua = '''
  jj_interactive("push", "-r", "closest_bookmark(" .. context.change_id() .. ")", "--allow-new")
  revisions.refresh()
'''

[[actions]]
name = "tug"
lua = '''
  jj_async("bookmark", "advance")
  revisions.refresh()
'''

[[actions]]
name = "show-after-revisions"
lua = '''
  revset.set("::" .. context.change_id())
'''

[[actions]]
name = "move-commit-down"
lua = '''
  jj_async("rebase", "-r", context.change_id(), "--insert-before", context.change_id() .. "-")
  revisions.refresh()
  revisions.move_down()
'''

[[actions]]
name = "move-commit-up"
lua = '''
  jj("rebase", "-r", context.change_id(), "--insert-after", context.change_id() .. "+")
  revisions.refresh()
  revisions.move_up()
'''

[[actions]]
name = "new-after-change"
lua = '''
  jj_async("new", "-A", context.change_id())
  revisions.refresh()
'''

[[actions]]
name = "new-before-change"
lua = '''
  jj_async("new", "-B", context.change_id())
  revisions.refresh()
'''

[[actions]]
name = "new-note-commit"
lua = '''
  jj_async("new", "--no-edit", "-A", context.change_id())
  revisions.refresh()
'''

[[bindings]]
action = "new-from-main"
key = "N"
scope = "revisions"
desc = "New change from main"

[[bindings]]
action = "push"
key = "ð"
scope = "revisions"
desc = "jj push"

[[bindings]]
action = "push-closest-bookmark"
key = "Ð"
scope = "revisions"
desc = "Push closest bookmark(s) (allows new)"

[[bindings]]
action = "tug"
key = "T"
scope = "revisions"
desc = "Tug bookmark"

[[bindings]]
action = "show-after-revisions"
key = "Z"
scope = "revisions"
desc = "Show after revisions (::@)"

[[bindings]]
action = "move-commit-down"
key = "J"
scope = "revisions"
desc = "Move commit down"

[[bindings]]
action = "move-commit-up"
key = "K"
scope = "revisions"
desc = "Move commit up"

[[bindings]]
action = "new-note-commit"
key = "ctrl+n"
scope = "revisions"
desc = "New note commit"

# Leader sequences (þ as leader key)
[[bindings]]
action = "ui.expand_status"
seq = ["þ", "h"]
scope = "revisions"
desc = "Help"

[[bindings]]
action = "tug"
seq = ["þ", "g", "t"]
scope = "revisions"
desc = "Git Tug"

[[bindings]]
action = "new-after-change"
seq = ["þ", "n", "a"]
scope = "revisions"
desc = "New change after"

[[bindings]]
action = "new-before-change"
seq = ["þ", "n", "b"]
scope = "revisions"
desc = "New change before"

# Override inline describe accept: add plain "enter" (default is alt+enter + ctrl+s)
[[bindings]]
action = "revisions.inline_describe.accept"
key = ["enter", "ctrl+s"]
scope = "revisions.inline_describe"
desc = "accept"

[[bindings]]
action = "revisions.inline_describe.new_line"
key = ["shift+enter", "ctrl+n"]
scope = "revisions.inline_describe"
desc = "New Line"
